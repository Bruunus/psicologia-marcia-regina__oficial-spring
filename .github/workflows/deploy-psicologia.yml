name: Deploy Psicologia Marcia

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Buildar o projeto Spring
        run: mvn clean package -DskipTests

      - name: Configurar chave SSH
        shell: bash
        run: |
          set -e
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Enviar JAR para a VPS
        shell: bash
        run: |
          set -e
          scp -P "${{ secrets.VPS_PORT }}" \
            -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=yes \
            target/psicologia-marcia-regina-v.01.jar \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/"

      - name: Rebuildar e subir container na VPS
        shell: bash
        run: |
          set -e
          ssh -p "${{ secrets.VPS_PORT }}" \
            -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << EOF
            cd "${{ secrets.VPS_APP_DIR }}"
            docker compose up -d --build
          EOF