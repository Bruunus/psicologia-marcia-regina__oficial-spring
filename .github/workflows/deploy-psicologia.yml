name: Deploy Psicologia Marcia

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Buildar o projeto Spring
        run: mvn clean package -DskipTests

      - name: Localizar JAR gerado
        id: find_jar
        shell: bash
        run: |
          set -e
          JAR_FILE=$(find target -maxdepth 1 -type f -name "*.jar" ! -name "*.original" | head -n 1)
          if [ -z "$JAR_FILE" ]; then
            echo "Nenhum arquivo .jar encontrado em target/"
            exit 1
          fi
          echo "JAR_FILE=$JAR_FILE" >> $GITHUB_ENV
          echo "Jar encontrado: $JAR_FILE"

      - name: Configurar chave SSH
        shell: bash
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat <<'EOF' > ~/.ssh/id_ed25519
          ${{ secrets.VPS_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts

      - name: Enviar JAR para a VPS
        shell: bash
        run: |
          set -e
          scp -P "${{ secrets.VPS_PORT }}" \
            -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            "$JAR_FILE" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/psicologia-marcia-regina-v.01.jar"

      - name: Rebuildar e subir container na VPS
        shell: bash
        run: |
          set -e
          ssh -p "${{ secrets.VPS_PORT }}" \
            -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << EOF
            cd "${{ secrets.VPS_APP_DIR }}"
            docker compose up -d --build
          EOF